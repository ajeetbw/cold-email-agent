# Cold Email Agent Configuration
# Ethical and production-ready settings

smtp:
  # Email provider settings
  provider: 'gmail'  # Options: gmail, outlook, sendgrid
  smtp_server: 'smtp.gmail.com'
  smtp_port: 587
  sender_email: 'your-email@gmail.com'  # Change this
  sender_name: 'Your Name'
  app_password: '${APP_PASSWORD}'  # Use environment variable

# Email sending constraints (anti-spam measures)
sending:
  max_emails_per_day: 30  # Conservative limit
  emails_per_hour: 5
  delay_between_emails_seconds_min: 45  # Randomized: 45-120 seconds
  delay_between_emails_seconds_max: 120
  timeout_seconds: 30

# Follow-up settings
follow_up:
  first_followup_days: 3
  second_followup_days: 7
  enabled: true

# Lead enrichment
enrichment:
  fetch_website_content: true
  website_timeout_seconds: 10
  user_agent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'

# AI Provider (OpenAI)
ai:
  provider: 'openai'
  model: 'gpt-3.5-turbo'
  api_key: '${OPENAI_API_KEY}'
  temperature: 0.7

# Database
database:
  type: 'sqlite'
  path: './data/email_agent.db'

# Logging
logging:
  level: 'INFO'
  log_file: './logs/agent.log'
  console_output: true

# CSV lead file settings
leads:
  input_file: './leads/leads.csv'
  required_columns: ['name', 'email', 'company', 'role', 'website']
